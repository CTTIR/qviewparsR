url: https://r-heller.github.io/qviewparsR/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: qviewparsR
  description: >
    Pure-R parser for Quansys Q-View `.Q-View` binary ELISA project files.

reference:
  - title: Reader
    desc: Parse a Q-View binary project file.
    contents:
      - read_qview

  - title: Helpers
    desc: Naming convention and plate-coordinate utilities.
    contents:
      - strip_qview_prefix
      - well_label
      - read_qview_template

  - title: Methods
    desc: Print and plot a parsed `qview` object.
    contents:
      - print.qview
      - plot.qview

  - title: Export
    desc: Write a parsed `qview` object to disk.
    contents:
      - qview_to_xlsx
      - qview_to_csv_dir

  - title: Shiny app
    desc: Upload, preview, visualise, and download a `.Q-View` file.
    contents:
      - qview_app

  - title: Package
    contents:
      - qviewparsR-package

articles:
  - title: Getting started
    navbar: ~
    contents:
      - qviewparsR

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
