url: https://cttir.github.io/qviewparsR/

template:
  bootstrap: 5
  light-switch: true
  theme: gruvbox-light
  theme-dark: gruvbox-dark
  bslib:
    # Hugo Coder colour theme — light mode
    bg: "#fafafa"
    fg: "#212121"
    primary: "#1565c0"
    navbar-light-bg: "#fafafa"
    # Hugo Coder colour theme — dark mode (Bootstrap 5 light-switch)
    navbar-dark-bg: "#212121"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}
includes:
  in_header: |
    <link rel="icon" type="image/svg+xml" href="favicon.svg">


home:
  title: qviewparsR
  description: >
    Pure-R parser for `.Q-View` binary multiplex ELISA project files.

reference:
  - title: Reader
    desc: Parse a Q-View binary project file.
    contents:
      - read_qview

  - title: Helpers
    desc: Naming convention and plate-coordinate utilities.
    contents:
      - strip_qview_prefix
      - well_label
      - read_qview_template

  - title: Methods
    desc: Print, summarise, plot, and coerce a parsed `qview` object.
    contents:
      - is_qview
      - print.qview
      - summary.qview
      - plot.qview
      - as_tibble.qview

  - title: Export
    desc: Write a parsed `qview` object to disk.
    contents:
      - write_qview_xlsx
      - write_qview_csv
      - write_qview_rds

  - title: Shiny app
    desc: Upload, preview, visualise, and download a `.Q-View` file.
    contents:
      - qview_app

  - title: Package
    contents:
      - qviewparsR-package

articles:
  - title: Getting started
    navbar: ~
    contents:
      - qviewparsR

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
