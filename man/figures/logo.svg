<svg width="500" height="580" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgcomp" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#080612"/>
      <stop offset="100%" stop-color="#04030a"/>
    </linearGradient>
    <linearGradient id="arrowgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00BFA5" stop-opacity="0.3"/>
      <stop offset="40%"  stop-color="#00BFA5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00897B" stop-opacity="0.95"/>
    </linearGradient>
    <clipPath id="hexcomp">
      <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"/>
    </clipPath>
  </defs>

  <polygon points="250,30 455,145 455,375 250,490 45,375 45,145" fill="url(#bgcomp)"/>

  <g clip-path="url(#hexcomp)">

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- SUBTLE BACKGROUND                                      -->
    <!-- ══════════════════════════════════════════════════════ -->
    <circle cx="250" cy="310" r="160" fill="none" stroke="#1a0a3a" stroke-width="0.5" opacity="0.4"/>
    <circle cx="250" cy="310" r="120" fill="none" stroke="#1a0a3a" stroke-width="0.4" opacity="0.3"/>
    <circle cx="250" cy="310" r="80"  fill="none" stroke="#1a0a3a" stroke-width="0.4" opacity="0.25"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- CENTRAL ARROW — raw data → clean export               -->
    <!-- Vertical, centre of hex                               -->
    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Arrow shaft -->
    <line x1="250" y1="165" x2="250" y2="432"
      stroke="url(#arrowgrad)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrow outer glow -->
    <line x1="250" y1="165" x2="250" y2="432"
      stroke="#00BFA5" stroke-width="10" opacity="0.06" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="237,425 250,448 263,425" fill="#00897B" opacity="0.95"/>
    <!-- Arrow source dot -->
    <circle cx="250" cy="165" r="6" fill="#00BFA5" opacity="0.85"/>
    <circle cx="250" cy="165" r="3" fill="#ffffff" opacity="0.8"/>

    <!-- "Raw" label top -->
    <rect x="214" y="148" width="72" height="18" rx="4"
      fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1" opacity="0.9"/>
    <text font-family="monospace" font-size="8" font-weight="700"
      fill="#888899" text-anchor="middle" x="250" y="161">raw data</text>

    <!-- "Export" label bottom -->
    <rect x="208" y="452" width="84" height="18" rx="4"
      fill="#0d1a18" stroke="#00897B" stroke-width="1.2" opacity="0.9"/>
    <text font-family="monospace" font-size="8" font-weight="700"
      fill="#00BFA5" text-anchor="middle" x="250" y="465">clean export</text>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- DOUBLE HELIX — purple strands spiraling around arrow  -->
    <!-- Two sinusoidal strands offset 180°                    -->
    <!-- Left strand purple, right strand lavender             -->
    <!-- 5 full turns from y=170 to y=440                      -->
    <!-- ══════════════════════════════════════════════════════ -->

    <!-- Strand A (purple) — peaks left then right -->
    <path d="
      M 250,172
      C 210,182 170,195 170,210
      C 170,225 210,238 250,248
      C 290,258 330,272 330,287
      C 330,302 290,315 250,325
      C 210,335 170,348 170,363
      C 170,378 210,392 250,402
      C 290,412 330,425 330,440
    " fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" opacity="0.88"/>
    <!-- Strand A glow -->
    <path d="
      M 250,172
      C 210,182 170,195 170,210
      C 170,225 210,238 250,248
      C 290,258 330,272 330,287
      C 330,302 290,315 250,325
      C 210,335 170,348 170,363
      C 170,378 210,392 250,402
      C 290,412 330,425 330,440
    " fill="none" stroke="#7C3AED" stroke-width="8" opacity="0.1" stroke-linecap="round"/>

    <!-- Strand B (lavender) — offset 180° -->
    <path d="
      M 250,172
      C 290,182 330,195 330,210
      C 330,225 290,238 250,248
      C 210,258 170,272 170,287
      C 170,302 210,315 250,325
      C 290,335 330,348 330,363
      C 330,378 290,392 250,402
      C 210,412 170,425 170,440
    " fill="none" stroke="#C4B5F7" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>
    <!-- Strand B glow -->
    <path d="
      M 250,172
      C 290,182 330,195 330,210
      C 330,225 290,238 250,248
      C 210,258 170,272 170,287
      C 170,302 210,315 250,325
      C 290,335 330,348 330,363
      C 330,378 290,392 250,402
      C 210,412 170,425 170,440
    " fill="none" stroke="#C4B5F7" stroke-width="6" opacity="0.08" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- COMPLEMENT FRAGMENT LABELS — at helix nodes           -->
    <!-- Each at a crossing/extremum of the helix              -->
    <!-- ══════════════════════════════════════════════════════ -->

    <!-- Node 1: Ba — left extreme, y≈210 -->
    <circle cx="170" cy="210" r="14" fill="#1a0a3a" stroke="#7C3AED" stroke-width="1.8" opacity="0.95"/>
    <text font-family="monospace" font-size="9" font-weight="700"
      fill="#C4B5F7" text-anchor="middle" x="170" y="214" opacity="0.95">Ba</text>
    <!-- connector tick -->
    <line x1="184" y1="210" x2="250" y2="210" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.3"/>

    <!-- Node 2: Bb — right extreme, y≈287 -->
    <circle cx="330" cy="287" r="14" fill="#1a0a3a" stroke="#7C3AED" stroke-width="1.8" opacity="0.95"/>
    <text font-family="monospace" font-size="9" font-weight="700"
      fill="#C4B5F7" text-anchor="middle" x="330" y="291" opacity="0.95">Bb</text>
    <line x1="316" y1="287" x2="250" y2="287" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.3"/>

    <!-- Node 3: C3a — left extreme, y≈363 -->
    <circle cx="170" cy="363" r="14" fill="#0a1a18" stroke="#00BFA5" stroke-width="1.8" opacity="0.95"/>
    <text font-family="monospace" font-size="8.5" font-weight="700"
      fill="#80CBC4" text-anchor="middle" x="170" y="367" opacity="0.95">C3a</text>
    <line x1="184" y1="363" x2="250" y2="363" stroke="#00BFA5" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.3"/>

    <!-- Node 4: C5a — right extreme, y≈440 (near bottom) -->
    <circle cx="330" cy="440" r="14" fill="#0a1a18" stroke="#00BFA5" stroke-width="1.8" opacity="0.95"/>
    <text font-family="monospace" font-size="8.5" font-weight="700"
      fill="#80CBC4" text-anchor="middle" x="330" y="444" opacity="0.95">C5a</text>
    <line x1="316" y1="440" x2="250" y2="440" stroke="#00BFA5" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.3"/>

    <!-- Node 5: C3b — right extreme at y≈210 (on strand B) -->
    <circle cx="330" cy="210" r="12" fill="#1a0a3a" stroke="#534AB7" stroke-width="1.5" opacity="0.9"/>
    <text font-family="monospace" font-size="8" font-weight="700"
      fill="#AAAAEE" text-anchor="middle" x="330" y="214" opacity="0.88">C3b</text>

    <!-- Node 6: iC3b — left extreme y≈287 (on strand B) -->
    <circle cx="170" cy="287" r="12" fill="#1a0a3a" stroke="#534AB7" stroke-width="1.5" opacity="0.9"/>
    <text font-family="monospace" font-size="7.5" font-weight="700"
      fill="#AAAAEE" text-anchor="middle" x="170" y="291" opacity="0.85">iC3b</text>

    <!-- Node 7: MAC — small at y≈363 right (strand B) -->
    <circle cx="330" cy="363" r="12" fill="#0a1a18" stroke="#00897B" stroke-width="1.5" opacity="0.88"/>
    <text font-family="monospace" font-size="7.5" font-weight="700"
      fill="#4DB6AC" text-anchor="middle" x="330" y="367" opacity="0.85">MAC</text>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- RUNG CONNECTIONS between the two strands              -->
    <!-- At crossings (where strands meet at centre x=250)     -->
    <!-- ══════════════════════════════════════════════════════ -->
    <line x1="230" y1="248" x2="270" y2="248"
      stroke="#a78bfa" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
    <line x1="230" y1="325" x2="270" y2="325"
      stroke="#a78bfa" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
    <line x1="230" y1="402" x2="270" y2="402"
      stroke="#a78bfa" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="230" y1="172" x2="270" y2="172"
      stroke="#a78bfa" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- COMPLEMENT PATHWAY LABEL — small top right            -->
    <!-- ══════════════════════════════════════════════════════ -->
    <text font-family="monospace" font-size="7" fill="#7C3AED" opacity="0.5"
      text-anchor="middle" x="380" y="185">classical</text>
    <text font-family="monospace" font-size="7" fill="#534AB7" opacity="0.45"
      text-anchor="middle" x="380" y="195">lectin</text>
    <text font-family="monospace" font-size="7" fill="#00BFA5" opacity="0.45"
      text-anchor="middle" x="380" y="205">alternative</text>
    <line x1="356" y1="181" x2="356" y2="208" stroke="#3a3a5c" stroke-width="0.6" opacity="0.4"/>
    <line x1="353" y1="181" x2="356" y2="181" stroke="#3a3a5c" stroke-width="0.6" opacity="0.4"/>
    <line x1="353" y1="208" x2="356" y2="208" stroke="#3a3a5c" stroke-width="0.6" opacity="0.4"/>
    <text font-family="monospace" font-size="6" fill="#3a3a5c" opacity="0.5"
      text-anchor="middle" x="378" y="218">pathways</text>

  </g>

  <!-- Hex border — teal -->
  <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"
    fill="none" stroke="#00897B" stroke-width="11" stroke-linejoin="round"/>
  <polygon points="250,44 441,153 441,367 250,476 59,367 59,153"
    fill="none" stroke="#4DB6AC" stroke-width="1.5" stroke-linejoin="round" opacity="0.5"/>

  <!-- Package name -->
  <text font-family="monospace" font-weight="700" font-size="27"
    fill="#80CBC4" text-anchor="middle" x="250" y="545" letter-spacing="1">comparsR</text>
</svg>
